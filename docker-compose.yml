services:
  mysql:
    image: mysql:8.0
    container_name: trojan-market-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trojan_market}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-trojan}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Port 3306 is intentionally NOT published to the host — only reachable on the
    # internal compose network. Use `docker compose exec mysql mysql ...` for ops access.
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - trojan-internal

  backend:
    build:
      context: ./backend
    container_name: trojan-market-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-trojan_market}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-trojan}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_ISSUER: ${JWT_ISSUER:-trojan-market}
      USC_SSO_ENTITY_ID: ${USC_SSO_ENTITY_ID}
      USC_SSO_IDP_METADATA_URL: ${USC_SSO_IDP_METADATA_URL}
      USC_SSO_CALLBACK_URL: ${USC_SSO_CALLBACK_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SERVER_PORT: 8080
    ports:
      - "80:8080"
    networks:
      - trojan-internal

volumes:
  mysql_data:

networks:
  trojan-internal:
    driver: bridge
