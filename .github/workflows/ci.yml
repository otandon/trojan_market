name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend:
    name: Backend — mvn package + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn -B -DskipTests package

      - name: Test
        run: mvn -B test
        env:
          # Tests run without a live DB; provide stub values so @Value resolves.
          JWT_SECRET: ci-only-secret-must-be-at-least-32-bytes-long
          USC_SSO_ENTITY_ID: urn:ci
          USC_SSO_IDP_METADATA_URL: http://localhost/idp
