name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend:
    name: Backend — mvn package + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn -B -DskipTests package

      - name: Test
        run: mvn -B test
        env:
          # @ActiveProfiles("test") loads application-test.properties which
          # uses H2 + a test JWT secret. Spring Boot still resolves the env-var
          # placeholders against the OS env, so we set JWT_SECRET to satisfy
          # the placeholder in application.properties even though the test
          # profile overrides it.
          JWT_SECRET: ci-only-secret-must-be-at-least-32-bytes-long
