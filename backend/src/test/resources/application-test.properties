# Active by default for tests via @ActiveProfiles("test").
# H2 in MySQL-compatibility mode so the JPA entities map cleanly without
# standing up a real MySQL instance. Flyway is disabled in tests because the
# V1+ migrations use MySQL-specific ENUM syntax — JPA's ddl-auto=create-drop
# regenerates the schema from entities for the smoke test.

spring.datasource.url=jdbc:h2:mem:trojanmarket-test;MODE=MySQL;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

# JWT secret long enough for HS256
app.jwt.secret=test-only-secret-must-be-at-least-32-bytes-long-yes
app.jwt.expiration-ms=3600000
app.jwt.issuer=trojan-market-test

# Email transport intentionally unconfigured — EmailService falls back to logs.
app.sendgrid.api-key=
app.mail.from=Trojan Market Test <noreply@example.com>

app.cors.allowed-origins=http://localhost:5173
