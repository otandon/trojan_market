spring.application.name=trojan-market

server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/api/v1

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/trojan_market?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=${JWT_ISSUER:trojan-market}

# Mail (SMTP) — Spring Boot only auto-creates a JavaMailSender bean when
# `spring.mail.host` is set, so we DO NOT declare it with an empty default here.
# Set SPRING_MAIL_HOST + SPRING_MAIL_USERNAME + SPRING_MAIL_PASSWORD as env vars to
# enable real email sending. Otherwise EmailService falls back to logging the
# verification code at WARN level.
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
app.mail.from=${APP_MAIL_FROM:Trojan Market <trojanmarket.noreply@gmail.com>}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging.level.com.trojanmarket=INFO
logging.level.org.springframework.security=INFO
