spring.application.name=trojan-market

server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/api/v1
# Allow large JSON request bodies for posting photos (base64-encoded). Capped at
# 32 MB — the frontend limits each photo to 2.5 MB and 8 photos max, which is
# ~27 MB after base64 inflation, so 32 MB gives headroom for JSON envelope.
server.tomcat.max-http-form-post-size=32MB
server.tomcat.max-swallow-size=32MB
spring.servlet.multipart.max-file-size=32MB
spring.servlet.multipart.max-request-size=32MB

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/trojan_market?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=${JWT_ISSUER:trojan-market}

# Email transport — preferred is SendGrid HTTP API (port 443 only, works on hosts
# that block outbound SMTP like Railway). Set SENDGRID_API_KEY and EmailService
# will use the API. SMTP is kept as a secondary path for local dev / SMTP-friendly
# hosts; set SPRING_MAIL_HOST + SPRING_MAIL_USERNAME + SPRING_MAIL_PASSWORD to
# activate it. Without either, the verification code is logged at WARN.
app.sendgrid.api-key=${SENDGRID_API_KEY:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
app.mail.from=${APP_MAIL_FROM:Trojan Market <trojanmarket.noreply@gmail.com>}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging.level.com.trojanmarket=INFO
logging.level.org.springframework.security=INFO
