spring.application.name=trojan-market
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/api/v1

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/trojan_market?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=${JWT_ISSUER:trojan-market}

app.usc.sso.entity-id=${USC_SSO_ENTITY_ID}
app.usc.sso.idp-metadata-url=${USC_SSO_IDP_METADATA_URL}
app.usc.sso.callback-url=${USC_SSO_CALLBACK_URL:http://localhost:8080/api/v1/auth/sso/callback}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging.level.com.trojanmarket=INFO
logging.level.org.springframework.security=INFO
